name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
    steps:
      - name: Checkout reel-rank
        uses: actions/checkout@v4
        with:
          path: reel-rank

      - name: Checkout vector-db (sibling)
        uses: actions/checkout@v4
        with:
          repository: Derran05W/vector-db
          path: vector-db-src

      - name: Configure
        run: >
          cmake -S reel-rank -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DREELRANK_VDB_DIR=${{ github.workspace }}/vector-db-src

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reel-rank
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          files=$(git ls-files '*.hpp' '*.cpp')
          echo "$files"
          clang-format --dry-run --Werror $files
