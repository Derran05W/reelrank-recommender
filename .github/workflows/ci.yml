name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
    steps:
      - name: Checkout reel-rank
        uses: actions/checkout@v4
        with:
          path: reel-rank

      - name: Checkout vector-db (sibling)
        uses: actions/checkout@v4
        with:
          repository: Derran05W/vector-db
          path: vector-db-src

      - name: Configure
        run: >
          cmake -S reel-rank -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DREELRANK_VDB_DIR=${{ github.workspace }}/vector-db-src

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      # D14: tiny end-to-end simulate run in CI from Phase 4 onward.
      - name: Smoke simulate
        run: ./build/apps/simulate --smoke --out smoke-results

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reel-rank
        uses: actions/checkout@v4

      - name: Install clang-format (pinned — the canonical formatter version for this repo)
        run: pipx install clang-format==22.1.8

      - name: Check formatting
        run: |
          files=$(git ls-files '*.hpp' '*.cpp')
          echo "$files"
          clang-format --dry-run --Werror $files
